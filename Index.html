<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaJobs - login</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: rgb(6, 147, 241);
        }

        .main-container{
            width: 100%;
            max-width: 400px;
            text-align: left;
        }

        h1{
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.1;
        }

        h1 span {
            color: #1a2e4d;
        }

        .btn-candidato{
            background-color: #1a2e4d;
            color: white;
            text-decoration: none;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 40px;
            transition: background 0.3s;
            text-align: center;
            display: inline-block;
        }

        .btn-candidato:hover{
            background-color: #111f33;
            color: aqua;
        }

        .tagline{
            font-size: 1.1rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .input-group{
            margin-bottom: 15px;
            
        }

        input[type="text"],
        input[type="password"]{
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            outline: none;
            background-color: rgba(6, 147, 241, 0.099);
        }

        .links-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .forgot-password, .create-account {
            color:#111f33;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            transition: color 0.3s;
        }

        .forgot-password:hover, .create-account:hover {
            color: rgb(3, 49, 157);
        }

        .btn-submit{
            background-color: #1a2e4d;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-submit:hover{
            transform: scale(1.02);
            background-color:#111f33;
            color: aqua;
        }

        .form-footer{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .checkbox-container{
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .checkbox-container input{
           margin-right: 8px;
        }

        .erro{
            color: #8b0000;
            font-size: 13px;
            display: block;
            min-height: 18px;
            margin-top: 5px;
            font-weight: bold;
        }

        @media(max-width:480px){
            h1{
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Bem-Vindo ao<br><span>EducaJobs!</span></h1>
            <a href="empregos.html" class="btn-candidato">Entrar Como Candidato</a>
        </header>

        <section class="login-section">
            <p class="tagline">Agora você pode explorar a rede de sucesso!</p>

            <form class="login-form" onsubmit="return validarLogin(event)">
                <div class="input-group">
                    <input type="text" id="loginEmail" placeholder="Email ou Telefone" required>
                    <span id="erroEmail" class="erro"></span>
                </div>

                <div class="input-group">
                    <input type="password" id="loginSenha" placeholder="Senha" required>
                    <span id="erroSenha" class="erro"></span>
                </div>

                <div class="links-row">
                    <a href="Recuperar conta.html" class="forgot-password">Esqueceu a Senha?</a>
                    <a href="Criar conta br.html" class="create-account">Criar conta</a>
                </div>

                <button type="submit" class="btn-submit">Entrar</button>

                <div class="form-footer">
                    <label class="checkbox-container">
                        <input type="checkbox">Lembrar-me
                    </label>
                </div>
            </form>
        </section>
    </div>

    <script>
        function validarLogin(event) {
            // Impede o envio real do formulário para que o JS controle o redirecionamento
            event.preventDefault();

            let emailTel = document.getElementById("loginEmail").value.trim();
            let senha = document.getElementById("loginSenha").value;
            let erroEmail = document.getElementById("erroEmail");
            let erroSenha = document.getElementById("erroSenha");
            let valido = true;

            // Regex simples para Email e Telefone
            let regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let regexTelefone = /^[0-9]{8,}$/;

            // Validação do campo Login
            if (regexEmail.test(emailTel) || regexTelefone.test(emailTel)) {
                erroEmail.innerHTML = "";
            } else {
                erroEmail.innerHTML = "Digite um email válido ou telefone (mín. 8 dígitos).";
                valido = false;
            }

            // Validação da Senha (Mín 8 caracteres, Maiúscula, Minúscula, Número e Especial)
            let regexSenha = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
            if (!regexSenha.test(senha)) {
                erroSenha.innerHTML = "A senha deve ter 8+ caracteres, maiúscula, número e símbolo.";
                valido = false;
            } else {
                erroSenha.innerHTML = "";
            }

            // Se tudo estiver certo, redireciona
            if (valido) {
                console.log("Login válido! Redirecionando...");
                window.location.href = "Pagina inicial.html";
            }

            return false;
        }
    </script>
</body>
</html>
